<div class="registro2-page">
  <div class="imagen-panel">
    <img src="Img/ImagenRegis.png" alt="Fondo registro" />
  </div>

  <div class="form-panel">
    <h1>REGISTRO</h1>
    <h3>Datos médicos</h3>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <!-- Nombre contacto de emergencias -->
      <div class="field-group">
        <label for="emergencyName">Nombre completo del contacto de emergencias</label>
        <input
          id="emergencyName"
          type="text"
          formControlName="emergencyName"
          [class.error]="isFieldInvalid('emergencyName')"
        />
        <span class="error-message" *ngIf="isFieldInvalid('emergencyName')">
          {{ getFieldError('emergencyName') }}
        </span>
      </div>

      <!-- Teléfono contacto de emergencias -->
      <div class="field-group">
        <label for="emergencyPhone">Número de celular del contacto de emergencias</label>
        <input
          id="emergencyPhone"
          type="tel"
          formControlName="emergencyPhone"
          [class.error]="isFieldInvalid('emergencyPhone')"
        />
        <span class="error-message" *ngIf="isFieldInvalid('emergencyPhone')">
          {{ getFieldError('emergencyPhone') }}
        </span>
      </div>

      <!-- Tipo de sangre -->
      <div class="field-group">
        <label for="bloodType">Tipo de sangre</label>
        <input
          id="bloodType"
          type="text"
          formControlName="bloodType"
          [class.error]="isFieldInvalid('bloodType')"
        />
        <span class="error-message" *ngIf="isFieldInvalid('bloodType')">
          {{ getFieldError('bloodType') }}
        </span>
      </div>

      <!-- Sexo -->
      <div class="field-group">
        <label for="gender">Sexo</label>
        <input
          id="gender"
          type="text"
          formControlName="gender"
          [class.error]="isFieldInvalid('gender')"
        />
        <span class="error-message" *ngIf="isFieldInvalid('gender')">
          {{ getFieldError('gender') }}
        </span>
      </div>

      <!-- Historial médico -->
      <div class="field-group">
        <label for="medicalHistory">Historial médico</label>
        <textarea
          id="medicalHistory"
          rows="3"
          formControlName="medicalHistory"
          [class.error]="isFieldInvalid('medicalHistory')"
        ></textarea>
        <span class="error-message" *ngIf="isFieldInvalid('medicalHistory')">
          {{ getFieldError('medicalHistory') }}
        </span>
      </div>

      <!-- Botón -->
      <button type="submit" [disabled]="registerForm.invalid">
        Iniciar sesión
      </button>
    </form>

    <div class="paginacion">
      <span></span>
      <span></span>
      <span class="activo"></span>
    </div>
  </div>
</div>

<div class="registro2-page">
  <div class="imagen-panel">
    <img src="Img/ImagenRegis.png" alt="Fondo registro" />
  </div>

  <div class="form-panel">
    <h1>REGISTRO</h1>
    <h3>Datos personales</h3>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <!-- Nombre Completo -->
      <div class="field-group">
        <label for="fullName">Nombre Completo</label>
        <input
          id="fullName"
          type="text"
          formControlName="fullName"
          [class.error]="isFieldInvalid('fullName')"
        />
        <span class="error-message" *ngIf="isFieldInvalid('fullName')">
          {{ getFieldError('fullName') }}
        </span>
      </div>

      <!-- Carnet de identidad -->
      <div class="field-group">
        <label for="ci">Carnet de identidad</label>
        <input
          id="ci"
          type="text"
          formControlName="ci"
          [class.error]="isFieldInvalid('ci')"
        />
        <span class="error-message" *ngIf="isFieldInvalid('ci')">
          {{ getFieldError('ci') }}
        </span>
      </div>

      <!-- Fecha de nacimiento -->
      <div class="field-group">
        <label>Fecha de nacimiento</label>
        <div class="fecha-nac">
          <input
            type="number"
            placeholder="Día"
            formControlName="day"
            [class.error]="isFieldInvalid('day')"
          />
          <input
            type="number"
            placeholder="Mes"
            formControlName="month"
            [class.error]="isFieldInvalid('month')"
          />
          <input
            type="number"
            placeholder="Año"
            formControlName="year"
            [class.error]="isFieldInvalid('year')"
          />
        </div>
      </div>

      <!-- Nuevo: Dirección -->
      <div class="field-group">
        <label for="address">Dirección</label>
        <input
          id="address"
          type="text"
          formControlName="address"
          [class.error]="isFieldInvalid('address')"
        />
        <span class="error-message" *ngIf="isFieldInvalid('address')">
          {{ getFieldError('address') }}
        </span>
      </div>

      <!-- Número de celular -->
      <div class="field-group">
        <label for="phone">Número de celular</label>
        <input
          id="phone"
          type="tel"
          formControlName="phone"
          [class.error]="isFieldInvalid('phone')"
        />
        <span class="error-message" *ngIf="isFieldInvalid('phone')">
          {{ getFieldError('phone') }}
        </span>
      </div>

      <!-- Subir foto -->
      <div class="field-group">
        <label for="photo">Subir foto</label>
        <input id="photo" type="file" (change)="onFileSelected($event)" />
      </div>

      <!-- Botón -->
      <button type="submit" [disabled]="registerForm.invalid">
        <span *ngIf="!isLoading">Siguiente</span>
      </button>
    </form>

    <div class="paginacion">
      <span></span>
      <span class="activo"></span>
      <span></span>
    </div>
  </div>
</div>
